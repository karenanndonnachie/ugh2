<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Input Devices</title>
  <!-- Load p5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/p5.js"></script>
  <!-- Load p5.brush library -->
  <script src="https://cdn.jsdelivr.net/npm/p5.brush@latest"></script>
  <style>
    /* Reset margins and overflow to ensure sketch fills iframe cleanly */
    body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1c1c; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; cursor: crosshair; }
    canvas { display: block; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; background: rgba(30, 30, 30, 0.8); text-align: center; pointer-events: none; }
  </style>
</head>
<body>
  <div id="ui">Draw with Mouse! Keys: 1-Red, 2-Green, 3-Blue, C-Clear, Up/Down-Size</div>
  <script>
    /**
     * MOUSE AND KEYBOARD INPUT SKETCH
     * -------------------------------
     * This sketch turns the canvas into a dynamic drawing board.
     * It maps the mouse position to create continuous strokes using
     * the p5.brush library's `brush.line()`. The keyboard is mapped
     * to change colors (1, 2, 3) and adjust brush size (Up/Down arrows),
     * providing an expressive, textural drawing experience.
     */

    let brushColor;
    let brushSize = 2;

    function setup() {
      // Create a WEBGL canvas as required by p5.brush
      createCanvas(windowWidth, windowHeight, WEBGL);

      // Initialize p5.brush
      brush.scaleBrushes(1.5);

      // Initial background
      background(30);

      // Initial state
      brushColor = color(255);
    }

    function draw() {
      // We don't clear the background in draw() so the drawing persists!

      if (mouseIsPressed) {
        // Adjust mouse coordinates for WEBGL (origin is center)
        let mX = mouseX - width / 2;
        let mY = mouseY - height / 2;
        let pmX = pmouseX - width / 2;
        let pmY = pmouseY - height / 2;

        // Draw a textural stroke connecting previous to current position
        brush.set("charcoal", brushColor, brushSize);
        brush.line(pmX, pmY, mX, mY);
      }
    }

    function keyPressed() {
      if (key === '1') {
        brushColor = color(255, 100, 100); // Red
      } else if (key === '2') {
        brushColor = color(100, 255, 100); // Green
      } else if (key === '3') {
        brushColor = color(100, 150, 255); // Blue
      } else if (key === '4') {
        brushColor = color(255, 255, 100); // Yellow
      } else if (key === '5') {
        brushColor = color(255); // White
      } else if (key === 'c' || key === 'C') {
        background(30); // Clear canvas
      } else if (keyCode === UP_ARROW) {
        brushSize += 0.5; // Increase brush size
      } else if (keyCode === DOWN_ARROW) {
        brushSize = max(0.5, brushSize - 0.5); // Decrease brush size
      }
    }

    function doubleClicked() {
      background(30);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      background(30);
    }
  </script>
</body>
</html>
