<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microphone Input</title>
  <!-- Load p5.js library (using 1.10.0 or 1.9.0 might be safer for p5.sound compatibility, but let's try p5.js 2.x as recommended by p5.brush) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/p5.js"></script>
  <!-- Load p5.sound library for audio functionality -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/addons/p5.sound.min.js"></script>
  <!-- Load p5.brush library -->
  <script src="https://cdn.jsdelivr.net/npm/p5.brush@latest"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1c1c; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
    canvas { display: block; }
    #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; text-align: center; }
  </style>
</head>
<body>
  <div id="instructions">Click to start audio</div>
  <script>
    /**
     * MICROPHONE REACTIVE SKETCH
     * --------------------------
     * This sketch uses the p5.AudioIn() object to listen to the device's
     * microphone. The amplitude (volume) is then used to draw a shape
     * that expands and changes color based on how loud the sound is.
     * We've integrated the p5.brush library on a WEBGL canvas to give
     * the shape a lo-fi, hand-drawn 'janky' aesthetic, complete with
     * irregular edges and hatching textures.
     */

    let mic;

    function setup() {
      // p5.brush requires WEBGL mode
      createCanvas(windowWidth, windowHeight, WEBGL);

      // Initialize the audio input
      mic = new p5.AudioIn();
      mic.start();

      // Setup p5.brush scales
      brush.scaleBrushes(1.5);

      // Start the audio input on user click to comply with browser policies
      userStartAudio();
    }

    function draw() {
      // Clear the background in WEBGL
      background(30);

      // Hide instructions if audio context is running
      if (getAudioContext().state === 'running') {
        document.getElementById('instructions').style.display = 'none';
      }

      // Get current volume level (0 to 1)
      let vol = mic.getLevel();

      // Map volume to radius and color
      let radius = map(vol, 0, 1, 20, min(width, height) / 2);

      // Translate to center (WEBGL origin is already at the center, but let's be explicit)
      // Actually, WEBGL origin is at (0, 0, 0), so we just draw at 0, 0

      // Set a brush type and color
      brush.set("charcoal", "#ffffff", 2);

      // We can use hatch or fill
      let r = map(vol, 0, 1, 100, 255);
      let g = map(vol, 0, 1, 255, 50);
      let b = 150;

      // Add hatch texture inside the circle
      brush.hatch(5, 45, { rand: 0.2, continuous: false });
      brush.hatchStyle("rotring", color(r, g, b), 1);

      // Add a wash fill to make it pop
      brush.fill(color(r, g, b, 100));

      // Draw the circle with some irregularity (true flag)
      brush.circle(0, 0, radius, true);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    function mousePressed() {
      userStartAudio();
    }
  </script>
</body>
</html>
