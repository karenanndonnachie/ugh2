<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sound Generation</title>
  <!-- Load p5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/p5.js"></script>
  <!-- Load p5.sound library for audio functionality -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/addons/p5.sound.min.js"></script>
  <!-- Load p5.brush library -->
  <script src="https://cdn.jsdelivr.net/npm/p5.brush@latest"></script>
  <style>
    /* Reset margins and overflow to ensure sketch fills iframe cleanly */
    body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1c1c; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; cursor: crosshair;}
    canvas { display: block; }
    #instructions { position: absolute; pointer-events: none; text-align: center; }
  </style>
</head>
<body>
  <div id="instructions">Click and drag to make sound</div>
  <script>
    /**
     * SOUND SYNTHESIZER SKETCH
     * ------------------------
     * This sketch uses a p5.Oscillator to generate audio waveforms.
     * When you click and drag the mouse, the X-axis controls the pitch
     * (frequency) and the Y-axis controls the volume (amplitude).
     * The visualizer uses p5.brush on a WEBGL canvas to draw expressive,
     * hand-drawn style circles that respond to these audio parameters.
     */

    let osc;
    let playing = false;

    function setup() {
      // p5.brush requires WEBGL mode
      createCanvas(windowWidth, windowHeight, WEBGL);

      // Initialize an oscillator
      osc = new p5.Oscillator('sine');

      // Setup p5.brush
      brush.scaleBrushes(1.5);

      // Clear background once
      background(30);
    }

    function draw() {
      // We don't fully clear the background every frame to leave a trail,
      // but we draw a semi-transparent rect to fade older strokes.
      // In WEBGL, drawing a large rect with low opacity fakes a motion blur.
      push();
      translate(0, 0, -1); // Push behind strokes
      fill(30, 30, 30, 40);
      noStroke();
      rectMode(CENTER);
      rect(0, 0, width * 2, height * 2);
      pop();

      // If playing, adjust sound and draw based on mouse position
      if (playing) {
        document.getElementById('instructions').style.display = 'none';

        let mX = mouseX - width/2;
        let mY = mouseY - height/2;

        let freq = map(mouseX, 0, width, 100, 1000);
        osc.freq(freq);

        let amp = map(mouseY, 0, height, 1.0, 0.0);
        osc.amp(amp, 0.1);

        // Visualize the sound using p5.brush
        let r = map(freq, 100, 1000, 50, 255);
        let b = map(freq, 100, 1000, 255, 50);

        let size = map(amp, 0, 1, 10, min(width, height) / 3);

        // Draw with brush
        brush.set("HB", color(r, 100, b), 2);
        brush.noFill();
        brush.circle(mX, mY, size, true);

        // Add some splatter if volume is high
        if (amp > 0.6) {
           brush.set("spray", color(r, 100, b, 150), 1);
           brush.circle(mX, mY, size * 1.5, true);
        }
      }
    }

    function mousePressed() {
      userStartAudio();

      if (!playing) {
        osc.start();
        playing = true;
      }
    }

    function mouseReleased() {
      if (playing) {
        osc.amp(0, 0.5);
        setTimeout(() => {
          osc.stop();
          playing = false;
        }, 500);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      background(30);
    }
  </script>
</body>
</html>
